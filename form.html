<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta name="description" content="Responsive product review form with clear fields, validation, and submission confirmation with a counter.">
        <meta name="author" content="Nicole Zegarra">
        <title>Product Review</title>
        <!-- mobile-default -->
        <link href="styles/form-small.css" rel="stylesheet">
        <!-- enhance-desktop -->
        <link href="styles/form-large.css" rel="stylesheet">

        <script src="scripts/getdates.js" defer></script>
        <script src="scripts/form.js" defer></script>
    </head>

    <body>
    <!-- HEADER HERE -->
    	<header>
          <h1>Product Review</h1>
        </header>     
        
    <!-- CONTENT HERE -->
    <main>
        
        <form method="get" action="review.html" class="wf1">

            <fieldset>
                <label for="product-select">Product Name*</label>
                    <select id="product-select" name="product" class="option" required>
                        <option value="" disabled selected>Select a Product...</option>
                    </select>

                <label for="date">Date of Installation </label> 
                <input type="date" id="date" name="completeDate" required>

                <div>Audience</div>
                <div class="star-rating">
                    <input type="radio" name="stars" id="star-a" value="5" required>
                    <label for="star-a"></label>
              
                    <input type="radio" name="stars" id="star-b" value="4" required>
                    <label for="star-b"></label>
                
                    <input type="radio" name="stars" id="star-c" value="3" required>
                    <label for="star-c"></label>
                
                    <input type="radio" name="stars" id="star-d" value="2" required>
                    <label for="star-d"></label>
                
                    <input type="radio" name="stars" id="star-e" value="1" required>
                    <label for="star-e"></label>
              </div>              

                <div>Which features did you find useful in the product?</div>
                <span class="check">(Check all that apply)</span>
    
                <label for="durability"><input type="checkbox" id="durability" name="durability" value="yes">Durability</label>
                <label for="use"><input type="checkbox" id="use" name="use" value="yes">Ease Of Use</label>
                <label for="performance"><input type="checkbox" id="performance" name="performance" value="yes">Performance</label>
                <label for="design"><input type="checkbox" id="design" name="design" value="yes">Design</label>

                <label for="wrv">Written Review <span class="optional">(Optional)</span></label>
                <textarea name="writtenreview" id="wrv"></textarea>

                <label for="name">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="name" name="name" >

                <input type="submit" value="Post Review">

            </fieldset>
        </form>   
            
    </main>
        
<!-- FOOTER HERE -->   
        <footer>
            <p> &copy;<span id="currentyear"></span> | Nicole Zegarra | Peru </p>
            <p id="lastModified"></p>
        </footer>

</body>
</html>
